name: release

# Build the `snippet` CLI for Linux and macOS and attach the binaries to a
# GitHub Release. Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# `workflow_dispatch` also builds the binaries (as downloadable artifacts) on
# demand without creating a release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # create the release / upload assets

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14 # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13 # Intel
            target: x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # reqwest's default TLS is native-tls → needs OpenSSL headers on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dir="target/${{ matrix.target }}/release"
          strip "$dir/snippet" || true
          asset="snippet-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$dir" snippet
          shasum -a 256 "$asset" > "$asset.sha256" || sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      # Manual runs: keep the binaries as workflow artifacts.
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: snippet-${{ matrix.target }}
          path: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256

      # Tag pushes: attach to the GitHub Release (created if it doesn't exist).
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
