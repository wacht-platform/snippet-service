name: release

# Auto-release on a version bump: whenever the `version` in Cargo.toml changes
# (i.e. no `v<version>` tag exists yet), tag it, build the `snippet` CLI for
# Linux and macOS, and publish a GitHub Release. Pushing to main WITHOUT bumping
# the version does nothing (the tag already exists). `workflow_dispatch` releases
# the current Cargo.toml version if it hasn't been released yet.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # create the tag + release

jobs:
  check:
    name: check version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      release: ${{ steps.v.outputs.release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need existing tags

      - name: Read version and decide
        id: v
        shell: bash
        run: |
          set -euo pipefail
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "v$version is already tagged — nothing to release."
            echo "release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version v$version — will release."
            echo "release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag the release
        if: steps.v.outputs.release == 'true'
        run: |
          git tag "v${{ steps.v.outputs.version }}"
          git push origin "v${{ steps.v.outputs.version }}"

  build:
    name: ${{ matrix.target }}
    needs: check
    if: needs.check.outputs.release == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14 # Apple Silicon (arm64 only — Intel Macs unsupported)
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      # reqwest's default TLS is native-tls → needs OpenSSL headers on Linux.
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y pkg-config libssl-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          dir="target/${{ matrix.target }}/release"
          strip "$dir/snippet" || true
          asset="snippet-${{ matrix.target }}.tar.gz"
          tar -czf "$asset" -C "$dir" snippet
          shasum -a 256 "$asset" > "$asset.sha256" || sha256sum "$asset" > "$asset.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check.outputs.version }}
          files: |
            ${{ env.ASSET }}
            ${{ env.ASSET }}.sha256
